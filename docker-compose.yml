version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: interview-prep-mongodb
    restart: always
    ports:
      - "27020:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
      MONGO_INITDB_DATABASE: interviewprepai
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - interview-prep-network

volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local

networks:
  interview-prep-network:
    driver: bridge
